<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 연간 클래스 스케줄러 (컬러 인쇄 & 2월 최종 마감판)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .sat { color: #2563eb !important; } 
        .sun { color: #dc2626 !important; } 
        
        /* [핵심 색상 정의] 화면과 인쇄 시 동일하게 적용 */
        .session-odd { background-color: #bbf7d0 !important; color: black !important; border: 1px solid #86efac !important; }  
        .session-even { background-color: #ffbbee !important; color: black !important; border: 1px solid #f472b6 !important; } 
        
        .bg-legal { background-color: #71717a !important; color: white !important; } 
        .bg-academy { background-color: #fde047 !important; color: black !important; border: 1px solid #eab308 !important; } 
        .bg-prep { background-color: #a1a1aa !important; color: white !important; } 

        /* 🖨️ 인쇄 스타일 정의 (화면 컬러 그대로 유지) */
        @media print {
            .no-print { display: none !important; }
            body { 
                background: white; 
                padding: 0; 
                margin: 0; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            @page { size: A4 portrait; margin: 6mm 8mm; }
            .print-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
            .print-card { border: 1px solid #e5e7eb !important; page-break-inside: avoid; }
            
            /* 인쇄 시에도 배경색과 글자색 스타일을 완벽하게 유지하도록 강제 설정 */
            .session-odd, .session-even, .bg-legal, .bg-academy, .bg-prep {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div class="no-print max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-md mb-6 border border-gray-200">
        <h2 class="text-xl font-bold mb-4 text-gray-800">⚙️ 학원 연간 스케줄러 설정 (컬러 인쇄 최적화 버전)</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <div>
                <label class="block text-xs font-bold mb-1">기준 연도 설정 (3월 시작)</label>
                <input type="number" id="baseYear" class="w-full border p-2 rounded font-bold" value="2026" onchange="calculateSchedule()">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold mb-1">수업 요일 지정 (1개 선택 시 4회, 2개 이상 선택 시 8회 자동 정산)</label>
                <div class="flex gap-4 pt-2">
                    <label class="cursor-pointer"><input type="checkbox" class="day-check" value="1" id="chk_mon" onchange="calculateSchedule()"> 월</label>
                    <label class="cursor-pointer"><input type="checkbox" class="day-check" value="2" id="chk_tue" checked onchange="calculateSchedule()"> 화</label>
                    <label class="cursor-pointer"><input type="checkbox" class="day-check" value="3" id="chk_wed" onchange="calculateSchedule()"> 수</label>
                    <label class="cursor-pointer"><input type="checkbox" class="day-check" value="4" id="chk_thu" checked onchange="calculateSchedule()"> 목</label>
                    <label class="cursor-pointer"><input type="checkbox" class="day-check" value="5" id="chk_fri" onchange="calculateSchedule()"> 금</label>
                </div>
            </div>
            <div class="flex gap-2 items-end">
                <button onclick="saveToFirebase()" class="w-1/2 bg-blue-600 text-white font-bold py-2 rounded shadow hover:bg-blue-700 cursor-pointer">💾 서버 저장</button>
                <button onclick="window.print()" class="w-1/2 bg-emerald-600 text-white font-bold py-2 rounded shadow hover:bg-emerald-700 cursor-pointer">🖨️ 스케줄 인쇄</button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-[11px] font-bold text-gray-700 mb-1">법정 공휴일 (YYYY-MM-DD : 명칭)</label>
                <textarea id="legalHolidays" class="w-full h-32 border p-2 text-xs font-mono rounded" oninput="calculateSchedule()"></textarea>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-700 mb-1">학원 지정 휴일 (YYYY-MM-DD : 명칭)</label>
                <textarea id="academyHolidays" class="w-full h-32 border p-2 text-xs font-mono rounded" oninput="calculateSchedule()"></textarea>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-700 mb-1">Prep Day (YYYY-MM-DD : 명칭)</label>
                <textarea id="prepDays" class="w-full h-32 border p-2 text-xs font-mono rounded" oninput="calculateSchedule()"></textarea>
            </div>
        </div>
    </div>

    <div id="printArea" class="max-w-7xl mx-auto bg-white p-2">
        <h1 id="mainTitle" class="text-4xl font-black text-center mb-4 tracking-tight">2026 CLASS SCHEDULE</h1>

        <div class="flex justify-between items-end mb-4 border-b-2 border-black pb-2">
            <div>
                <div id="displayDays" class="text-2xl font-bold">수업 요일 : 화.목 ( Tue/Thu )</div>
                <div id="sessionNotice" class="text-xs font-bold text-green-700 mt-1">** 한달 수강료 기준 연속 매칭 처리됩니다.</div>
            </div>
            <div class="text-right text-xs font-bold space-y-1 text-gray-800 border p-2 rounded bg-gray-50 print:bg-white">
                <div><span class="inline-block w-5 h-3.5 bg-legal border border-gray-500 align-middle mr-1.5 rounded-sm"></span> 법정 공휴일</div>
                <div><span class="inline-block w-5 h-3.5 bg-academy border border-yellow-600 align-middle mr-1.5 rounded-sm"></span> 학원 지정 휴일</div>
                <div><span class="inline-block w-5 h-3.5 bg-prep border border-gray-500 align-middle mr-1.5 rounded-sm"></span> Prep Day</div>
            </div>
        </div>

        <div id="calendarGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 print-grid">
            </div>

        <div class="mt-6 pt-4 border-t-2 border-black text-xs font-bold space-y-1">
            <p>※ 수강료 납부 기간은 매월 25일 부터 말일까지 입니다.</p>
            <div class="flex justify-between items-center">
                <p>※ 휴강 일정과 특강 일정은 학원 사정에 따라 변경 될 수도 있음을 알려 드립니다.</p>
                <p id="alertFooter" class="text-red-600 text-sm font-extrabold"></p>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/schedule_continuous.json";

        const defaultData = {
            baseYear: 2026,
            selectedDays: [2, 4],
            legal: [
                "2026-03-02 : 삼일절 대체휴일", "2026-05-05 : 어린이날", "2026-05-25 : 부처님오신날 대체", 
                "2026-06-06 : 현충일", "2026-08-17 : 광복절 대체휴일", 
                "2026-09-24 : 추석 연휴", "2026-09-25 : 추석 연휴", "2026-09-26 : 추석 연휴", 
                "2026-10-05 : 개천절 대체휴일", "2026-10-09 : 한글날", "2026-12-25 : 성탄절", 
                "2027-01-01 : 새해 첫날", 
                "2027-02-06 : 설날 연휴", "2027-02-08 : 설날 연휴", "2027-02-09 : 설날 연휴"
            ],
            academy: [
                "2026-07-27 : 여름방학", "2026-07-28 : 여름방학", "2026-07-29 : 여름방학", 
                "2026-07-30 : 여름방학", "2026-07-31 : 여름방학"
            ],
            prep: [
                "2026-05-01 : Prep Day", "2026-07-17 : Prep Day", "2026-12-24 : Prep Day"
            ]
        };

        window.onload = async () => {
            try {
                const res = await fetch(DB_URL);
                if (res.ok) {
                    const data = await res.json();
                    if (data) {
                        document.getElementById('baseYear').value = data.baseYear || 2026;
                        document.getElementById('legalHolidays').value = (data.legal || []).join('\n');
                        document.getElementById('academyHolidays').value = (data.academy || []).join('\n');
                        document.getElementById('prepDays').value = (data.prep || []).join('\n');
                        
                        const targetDays = data.selectedDays || [2, 4];
                        document.getElementById('chk_mon').checked = targetDays.includes(1);
                        document.getElementById('chk_tue').checked = targetDays.includes(2);
                        document.getElementById('chk_wed').checked = targetDays.includes(3);
                        document.getElementById('chk_thu').checked = targetDays.includes(4);
                        document.getElementById('chk_fri').checked = targetDays.includes(5);

                        calculateSchedule();
                        return;
                    }
                }
                initDefault();
            } catch(e) { initDefault(); }
        };

        function initDefault() {
            document.getElementById('baseYear').value = defaultData.baseYear;
            document.getElementById('legalHolidays').value = defaultData.legal.join('\n');
            document.getElementById('academyHolidays').value = defaultData.academy.join('\n');
            document.getElementById('prepDays').value = defaultData.prep.join('\n');
            calculateSchedule();
        }

        async function saveToFirebase() {
            const selectedDays = Array.from(document.querySelectorAll('.day-check:checked')).map(cb => parseInt(cb.value));
            const payload = {
                baseYear: parseInt(document.getElementById('baseYear').value),
                selectedDays: selectedDays,
                legal: document.getElementById('legalHolidays').value.split('\n').filter(v => v.trim()),
                academy: document.getElementById('academyHolidays').value.split('\n').filter(v => v.trim()),
                prep: document.getElementById('prepDays').value.split('\n').filter(v => v.trim())
            };
            try {
                await fetch(DB_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                alert('💾 설정 데이터가 실시간 데이터베이스에 연동 저장되었습니다.');
            } catch(e) { alert('❌ 저장 실패'); }
        }

        function parseHolidayLines(id, baseYear) {
            const lines = document.getElementById(id).value.split('\n');
            const map = {}; const rawList = [];
            const minDate = new Date(baseYear, 2, 1);
            const maxDate = new Date(baseYear + 1, 2, 0);

            lines.forEach(line => {
                if(!line.includes(':')) return;
                const [datePart, name] = line.split(':').map(s => s.trim());
                const dateMatch = datePart.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (!dateMatch) return;

                const inputYear = parseInt(dateMatch[1]); const inputMonth = parseInt(dateMatch[2]); const inputDay = parseInt(dateMatch[3]);
                const dateObj = new Date(inputYear, inputMonth - 1, inputDay);
                
                if (dateObj >= minDate && dateObj <= maxDate) {
                    const dateKey = `${inputYear}-${String(inputMonth).padStart(2,'0')}-${String(inputDay).padStart(2,'0')}`;
                    map[dateKey] = name;
                    rawList.push({ dateObj, year: inputYear, month: inputMonth, day: inputDay, name });
                }
            });

            rawList.sort((a, b) => a.dateObj - b.dateObj);
            const textList = {}; const weekLabels = ['일', '월', '화', '수', '목', '금', '토'];

            let i = 0;
            while (i < rawList.length) {
                let startItem = rawList[i]; let endItem = rawList[i];
                while (i + 1 < rawList.length && rawList[i + 1].name === startItem.name && (rawList[i + 1].dateObj - endItem.dateObj) === 86400000) {
                    i++; endItem = rawList[i];
                }
                const startMonth = startItem.month;
                if (!textList[startMonth]) textList[startMonth] = [];
                const startDayLabel = weekLabels[startItem.dateObj.getDay()];
                const endDayLabel = weekLabels[endItem.dateObj.getDay()];

                if (startItem === endItem) {
                    textList[startMonth].push(`${startItem.month}/${startItem.day}(${startDayLabel}) : ${startItem.name}`);
                } else {
                    textList[startMonth].push(`${startItem.month}/${startItem.day}(${startDayLabel})~${endItem.month}/${endItem.day}(${endDayLabel}) : ${startItem.name}`);
                }
                i++;
            }
            return { map, textList };
        }

        function calculateSchedule() {
            const baseYear = parseInt(document.getElementById('baseYear').value);
            document.getElementById('mainTitle').innerText = `${baseYear} CLASS SCHEDULE`;

            const selectedDays = Array.from(document.querySelectorAll('.day-check:checked')).map(c => parseInt(c.value));
            const weekNames = {1:'월', 2:'화', 3:'수', 4:'목', 5:'금'};
            document.getElementById('displayDays').innerText = `수업 요일 : ${selectedDays.map(d=>weekNames[d]).join('.')} 반`;

            const sessionCutCount = (selectedDays.length === 1) ? 4 : 8;
            document.getElementById('sessionNotice').innerText = `** 한달 수강료 기준 (주 ${selectedDays.length}회, 연속 ${sessionCutCount}회 단위 세션 로테이션)`;

            const legal = parseHolidayLines('legalHolidays', baseYear);
            const academy = parseHolidayLines('academyHolidays', baseYear);
            const prep = parseHolidayLines('prepDays', baseYear);

            let globalClassDays = [];
            let startDate = new Date(baseYear, 2, 1);
            let endDate = new Date(baseYear + 1, 2, 0);

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const curY = d.getFullYear(); const curM = d.getMonth() + 1; const curD = d.getDate();
                const dKey = `${curY}-${String(curM).padStart(2,'0')}-${String(curD).padStart(2,'0')}`;
                
                if (legal.map[dKey] || academy.map[dKey] || prep.map[dKey]) continue;
                if (selectedDays.includes(d.getDay())) {
                    globalClassDays.push({ dateKey: dKey, month: curM, dateNum: curD, year: curY });
                }
            }

            // ⚠️ 2월 몰아주기 전용 세션 빌더 로직 보정
            let sessions = []; 
            let currentSession = [];
            
            globalClassDays.forEach((day, index) => {
                currentSession.push(day);
                
                // 내년 2월(즉, 학기 일정의 최종 월)에 포함된 수업일이 감지되기 시작하면, 
                // 더 이상 4회/8회로 쪼개지 않고 마지막 세션에 끝까지 밀어 넣어 통합시킵니다.
                const isFinalMonth = (day.year === baseYear + 1 && day.month === 2);
                
                if (!isFinalMonth && currentSession.length === sessionCutCount && index < globalClassDays.length - 1) {
                    sessions.push(currentSession);
                    currentSession = [];
                }
            });
            if (currentSession.length > 0) sessions.push(currentSession);

            const dateStyleMap = {}; const monthBannerInfo = {}; 

            sessions.forEach((session, sIdx) => {
                const sessionNum = sIdx + 1;
                const colorClass = (sessionNum % 2 !== 0) ? "session-odd" : "session-even";
                
                const firstDay = session[0];
                const lastDay = session[session.length - 1];
                const infoText = `${firstDay.month}/${firstDay.dateNum}~${lastDay.month}/${lastDay.dateNum} (${session.length}회)`;

                session.forEach(day => {
                    dateStyleMap[day.dateKey] = { colorClass: colorClass, sessionNum: sessionNum };
                    
                    // 각 월별 대표 노출 문구 셋업
                    if (!monthBannerInfo[day.month]) {
                        monthBannerInfo[day.month] = {
                            text: `${day.month}월 기간: ` + infoText,
                            bgClass: colorClass,
                            count: session.length
                        };
                    }
                    // 최종 2월은 몰아준 전체 개수가 제대로 기입되도록 오버라이딩
                    if (day.month === 2) {
                        monthBannerInfo[2] = {
                            text: `2월 기간: ` + infoText,
                            bgClass: colorClass,
                            count: session.length
                        };
                    }
                });
            });

            // 2월 최종 잔여 횟수 실시간 산출 및 푸터 업데이트
            const febFinalCount = monthBannerInfo[2] ? monthBannerInfo[2].count : 0;
            document.getElementById('alertFooter').innerText = `2월(${febFinalCount}회) 수강료 횟수가 다르오니 확인 부탁 드립니다. (매월 20일 수강료 안내)`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 12; i++) {
                const month = (i + 2) % 12 + 1;
                const currYear = (month < 3) ? baseYear + 1 : baseYear;
                
                const firstDayIdx = new Date(currYear, month - 1, 1).getDay();
                const lastDateNum = new Date(currYear, month, 0).getDate();
                const bInfo = monthBannerInfo[month] || { text: `${month}월 기간: 수업 없음`, bgClass: "bg-gray-200" };

                let html = `
                    <div class="print-card bg-white p-2.5 rounded border border-gray-200 flex flex-col justify-between shadow-sm">
                        <div>
                            <div class="${bInfo.bgClass} text-[10px] font-black text-center py-1 rounded text-black mb-1.5">${bInfo.text}</div>
                            <div class="text-center font-bold text-xs text-gray-600 mb-1">${currYear}년 ${month}월</div>
                            <table class="w-full text-[10px] text-center border-collapse">
                                <thead>
                                    <tr class="text-gray-400 font-normal border-b pb-0.5">
                                        <th class="sun font-normal">S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th class="sat font-normal">S</th>
                                    </tr>
                                </thead>
                                <tbody class="before:block before:h-1"><tr>`;

                for (let j = 0; j < firstDayIdx; j++) html += `<td></td>`;

                for (let d = 1; d <= lastDateNum; d++) {
                    const dateObj = new Date(currYear, month - 1, d);
                    const dKey = `${currYear}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dayOfWeek = dateObj.getDay();
                    
                    if ((firstDayIdx + d - 1) % 7 === 0 && d !== 1) html += `</tr><tr>`;

                    let bgClass = "";
                    if (legal.map[dKey]) bgClass = "bg-legal";
                    else if (academy.map[dKey]) bgClass = "bg-academy";
                    else if (prep.map[dKey]) bgClass = "bg-prep";
                    else if (dateStyleMap[dKey]) bgClass = dateStyleMap[dKey].colorClass;

                    let colorClass = "";
                    if (dayOfWeek === 0) colorClass = "sun";
                    else if (dayOfWeek === 6) colorClass = "sat";

                    html += `<td class="p-0.5"><div class="aspect-square flex items-center justify-center rounded-sm font-bold ${bgClass} ${colorClass}">${d}</div></td>`;
                }

                html += `</tr></tbody></table></div>`;

                let infoArr = [];
                if(legal.textList[month]) infoArr.push(...legal.textList[month]);
                if(academy.textList[month]) infoArr.push(...academy.textList[month]);
                if(prep.textList[month]) infoArr.push(...prep.textList[month]);

                html += `
                        <div class="mt-3 pt-1.5 text-[9.5px] font-bold text-gray-600 border-t border-dashed min-h-[35px]">
                            ${infoArr.map(t => `<div class="leading-tight text-gray-700">• ${t}</div>`).join('')}
                        </div>
                    </div>`;
                grid.innerHTML += html;
            }
        }
    </script>
</body>
</html>
