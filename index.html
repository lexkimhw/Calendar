<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026-2027 학원 클래스 스케줄러</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 달력 글자색 규칙 */
        .sat { color: #2563eb; } /* 파란색 */
        .sun { color: #dc2626; } /* 빨간색 */
        
        /* 휴일 및 세션 배경색 정의 */
        .bg-legal { background-color: #4b5563 !important; color: white !important; } /* 법정 공휴일 (진회색) */
        .bg-academy { background-color: #fde047 !important; color: black !important; } /* 학원 지정 휴일 (노란색) */
        .bg-prep { background-color: #9ca3af !important; color: white !important; } /* Prep Day (연회색) */
        
        /* 세션 하이라이트 색상 (이미지 패턴 매칭) */
        .session-even { background-color: #f472b6 !important; color: black !important; } /* 핑크색 세션 */
        .session-odd { background-color: #4ade80 !important; color: black !important; }  /* 연두색 세션 */
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">🗓️ 2026 CLASS SCHEDULE MANAGER</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-white p-6 rounded-xl shadow-md">
            <div>
                <h3 class="text-lg font-semibold mb-3 border-b pb-2">1. 수업 요일 및 횟수 설정</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium mb-1">수업 빈도</label>
                        <select id="classFrequency" class="w-full border rounded p-2" onchange="calculateSchedule()">
                            <option value="2">주 2회 반 (8회 기준 분할)</option>
                            <option value="1">주 1회 반 (4회 기준 분할)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">수업 요일 선택</label>
                        <div class="flex gap-2">
                            <label><input type="checkbox" class="day-check" value="2" checked onchange="calculateSchedule()"> 화</label>
                            <label><input type="checkbox" class="day-check" value="4" checked onchange="calculateSchedule()"> 목</label>
                            <label><input type="checkbox" class="day-check" value="1" onchange="calculateSchedule()"> 월</label>
                            <label><input type="checkbox" class="day-check" value="3" onchange="calculateSchedule()"> 수</label>
                            <label><input type="checkbox" class="day-check" value="5" onchange="calculateSchedule()"> 금</label>
                        </div>
                    </div>
                    <button onclick="saveToFirebase()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">
                        💾 Firebase에 데이터 저장
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <h3 class="text-sm font-semibold mb-2 flex items-center gap-1">
                        <span class="w-3 h-3 bg-legal inline-block rounded"></span> 법정 공휴일 (YYYY-MM-DD)
                    </h3>
                    <textarea id="legalHolidays" class="w-full h-32 p-2 border rounded text-xs" oninput="calculateSchedule()"></textarea>
                </div>
                <div>
                    <h3 class="text-sm font-semibold mb-2 flex items-center gap-1">
                        <span class="w-3 h-3 bg-academy inline-block rounded"></span> 학원 지정 휴일 (YYYY-MM-DD)
                    </h3>
                    <textarea id="academyHolidays" class="w-full h-32 p-2 border rounded text-xs" oninput="calculateSchedule()"></textarea>
                </div>
                <div>
                    <h3 class="text-sm font-semibold mb-2 flex items-center gap-1">
                        <span class="w-3 h-3 bg-prep inline-block rounded"></span> Prep Day (YYYY-MM-DD)
                    </h3>
                    <textarea id="prepDays" class="w-full h-32 p-2 border rounded text-xs" oninput="calculateSchedule()"></textarea>
                </div>
            </div>
        </div>

        <div id="calendarContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        // Firebase Database URL
        const DB_URL = "https://lexkimhw-63c3b-default-rtdb.asia-southeast1.firebasedatabase.app/schedule.json";

        // 기본값 설정 (이미지 내 일정 기준 샘플 데이터)
        const defaultData = {
            classFrequency: "2",
            selectedDays: [2, 4], // 화, 목
            legalHolidays: ["2026-03-02", "2026-05-01", "2026-05-05", "2026-05-25", "2026-06-06", "2026-08-17", "2026-09-24", "2026-09-25", "2026-09-26", "2026-10-05", "2026-10-09", "2026-12-25", "2027-01-01", "2027-02-06", "2027-02-08", "2027-02-09"],
            academyHolidays: ["2026-07-27", "2026-07-28", "2026-07-29", "2026-07-30", "2026-07-31"],
            prepDays: ["2026-05-25", "2026-06-06", "2026-08-17", "2026-12-25", "2027-01-01"] // 예시
        };

        // 데이터 로드 및 초기화
        async function loadData() {
            try {
                const response = await fetch(DB_URL);
                if (response.ok) {
                    const data = await response.json();
                    if (data) {
                        document.getElementById('classFrequency').value = data.classFrequency || "2";
                        document.getElementById('legalHolidays').value = (data.legalHolidays || []).join('\n');
                        document.getElementById('academyHolidays').value = (data.academyHolidays || []).join('\n');
                        document.getElementById('prepDays').value = (data.prepDays || []).join('\n');
                        
                        document.querySelectorAll('.day-check').forEach(cb => {
                            cb.checked = data.selectedDays ? data.selectedDays.includes(parseInt(cb.value)) : false;
                        });
                    } else {
                        initDefault();
                    }
                } else { initDefault(); }
            } catch (e) {
                console.error("Firebase 로드 실패, 기본값으로 구동합니다.", e);
                initDefault();
            }
            calculateSchedule();
        }

        function initDefault() {
            document.getElementById('legalHolidays').value = defaultData.legalHolidays.join('\n');
            document.getElementById('academyHolidays').value = defaultData.academyHolidays.join('\n');
            document.getElementById('prepDays').value = defaultData.prepDays.join('\n');
        }

        // Firebase에 현재 설정 저장
        async function saveToFirebase() {
            const selectedDays = Array.from(document.querySelectorAll('.day-check:checked')).map(cb => parseInt(cb.value));
            const dataToSave = {
                classFrequency: document.getElementById('classFrequency').value,
                selectedDays: selectedDays,
                legalHolidays: document.getElementById('legalHolidays').value.split('\n').map(v => v.trim()).filter(v => v),
                academyHolidays: document.getElementById('academyHolidays').value.split('\n').map(v => v.trim()).filter(v => v),
                prepDays: document.getElementById('prepDays').value.split('\n').map(v => v.trim()).filter(v => v)
            };

            try {
                const response = await fetch(DB_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                });
                if (response.ok) alert('✅ Firebase에 설정이 성공적으로 저장되었습니다!');
                else alert('❌ 저장에 실패했습니다.');
            } catch (e) {
                alert('❌ 네트워크 오류가 발생했습니다.');
            }
        }

        // 핵심 스케줄 계산 로직
        function calculateSchedule() {
            const frequency = parseInt(document.getElementById('classFrequency').value);
            const sessionSize = frequency === 2 ? 8 : 4; // 주2회는 8회씩, 주1회는 4회씩 묶음
            
            const selectedDays = Array.from(document.querySelectorAll('.day-check:checked')).map(cb => parseInt(cb.value));
            const legalHolidays = new Set(document.getElementById('legalHolidays').value.split('\n').map(v => v.trim()));
            const academyHolidays = new Set(document.getElementById('academyHolidays').value.split('\n').map(v => v.trim()));
            const prepDays = new Set(document.getElementById('prepDays').value.split('\n').map(v => v.trim()));

            // 2026-03-01 ~ 2027-02-28 루프 돌며 모든 수업 가능일 매핑 추출
            let classDaysInfo = {};
            let sessionCounter = 0;
            let currentSessionId = 1;

            let startDate = new Date(2026, 2, 1); // 2026년 3월 1일
            let endDate = new Date(2027, 2, 0);   // 2027년 2월 말일

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                let dateStr = d.toISOString().split('T')[0];
                let dayOfWeek = d.getDay(); // 0:일, 1:월, ..., 6:토

                // 제외 조건 체크
                let isLegal = legalHolidays.has(dateStr);
                let isAcademy = academyHolidays.has(dateStr);
                let isPrep = prepDays.has(dateStr);

                if (isLegal || isAcademy || isPrep) {
                    continue; // 휴일 및 Prep Day는 세션 카운트에서 완전 제외
                }

                // 선택된 수업 요일인지 확인
                if (selectedDays.includes(dayOfWeek)) {
                    sessionCounter++;
                    classDaysInfo[dateStr] = {
                        sessionId: currentSessionId,
                        sessionCount: sessionCounter
                    };

                    if (sessionCounter === sessionSize) {
                        sessionCounter = 0;
                        currentSessionId++;
                    }
                }
            }

            renderCalendars(classDaysInfo, legalHolidays, academyHolidays, prepDays);
        }

        // 달력 렌더링 화면 구현
        function renderCalendars(classDaysInfo, legal, academy, prep) {
            const container = document.getElementById('calendarContainer');
            container.innerHTML = '';

            // 2026년 3월부터 2027년 2월까지 12개월 순회
            const months = [
                {y: 2026, m: 2}, {y: 2026, m: 3}, {y: 2026, m: 4}, {y: 2026, m: 5},
                {y: 2026, m: 6}, {y: 2026, m: 7}, {y: 2026, m: 8}, {y: 2026, m: 9},
                {y: 2026, m: 10}, {y: 2026, m: 11}, {y: 2027, m: 0}, {y: 2027, m: 1}
            ];

            months.forEach(({y, m}) => {
                let firstDay = new Date(y, m, 1).getDay();
                let lastDate = new Date(y, m + 1, 0).getDate();
                let monthTitle = `${y}년 ${m + 1}월`;

                let html = `
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                        <h4 class="text-center font-bold text-md mb-2 bg-gray-100 py-1 rounded">${monthTitle}</h4>
                        <table class="w-full text-center text-xs table-fixed">
                            <thead>
                                <tr class="text-gray-500 font-semibold">
                                    <th class="sun">S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th class="sat">S</th>
                                </tr>
                            </thead>
                            <tbody><tr>
                `;

                // 첫째 주 공백 빈칸 채우기
                for (let i = 0; i < firstDay; i++) {
                    html += `<td></td>`;
                }

                let currentDayOfWeek = firstDay;
                for (let date = 1; date <= lastDate; date++) {
                    if (currentDayOfWeek === 7) {
                        html += `</tr><tr>`;
                        currentDayOfWeek = 0;
                    }

                    let dateObj = new Date(y, m, date);
                    let dateStr = dateObj.toISOString().split('T')[0];
                    
                    let dayClass = '';
                    if (currentDayOfWeek === 0) dayClass = 'sun';
                    if (currentDayOfWeek === 6) dayClass = 'sat';

                    let bgClass = '';
                    let titleText = '';

                    // 우선순위 매핑 스타일 처리
                    if (legal.has(dateStr)) bgClass = 'bg-legal';
                    else if (academy.has(dateStr)) bgClass = 'bg-academy';
                    else if (prep.has(dateStr)) bgClass = 'bg-prep';
                    else if (classDaysInfo[dateStr]) {
                        let info = classDaysInfo[dateStr];
                        bgClass = info.sessionId % 2 === 0 ? 'session-even' : 'session-odd';
                        titleText = `세션 ${info.sessionId} (${info.sessionCount}회차)`;
                    }

                    html += `
                        <td class="p-1">
                            <div class="w-full aspect-square flex flex-col items-center justify-center rounded-sm font-medium ${dayClass} ${bgClass}" title="${titleText}">
                                <span>${date}</span>
                                ${classDaysInfo[dateStr] ? `<span class="text-[9px] font-bold opacity-70">${classDaysInfo[dateStr].sessionCount}</span>` : ''}
                            </div>
                        </td>
                    `;
                    currentDayOfWeek++;
                }

                // 마지막 주 빈칸 채우기
                while (currentDayOfWeek < 7) {
                    html += `<td></td>`;
                    currentDayOfWeek++;
                }

                html += `</tr></tbody></table></div>`;
                container.innerHTML += html;
            });
        }

        // 페이지 로드 시 시작
        window.onload = loadData;
    </script>
</body>
</html>
