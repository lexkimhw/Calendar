<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026-2027 학원 클래스 스케줄러 (8회 세션 기반)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 기본 폰트 및 색상 */
        .sat { color: #2563eb !important; } 
        .sun { color: #dc2626 !important; } 
        
        /* 세션별 배경색 (이미지 기준: 연두/분홍 교차) */
        .session-odd { background-color: #bbf7d0 !important; color: black !important; }  /* 세션 1, 3, 5... (연두) */
        .session-even { background-color: #ffbbee !important; color: black !important; } /* 세션 2, 4, 6... (분홍) */
        
        /* 휴일 색상 */
        .bg-legal { background-color: #71717a !important; color: white !important; } 
        .bg-academy { background-color: #fde047 !important; color: black !important; } 
        .bg-prep { background-color: #a1a1aa !important; color: white !important; } 

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; -webkit-print-color-adjust: exact; }
            @page { size: A4 portrait; margin: 10mm; }
            .print-grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
            .print-card { border: 1px solid #ddd !important; page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div class="no-print max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-md mb-8 border border-blue-100">
        <h2 class="text-xl font-bold mb-4 text-blue-800">🛠️ 세션 자동 계산 설정 (8회 기준)</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
            <div>
                <label class="block text-xs font-bold mb-1">기준 연도</label>
                <input type="number" id="baseYear" class="w-full border p-2 rounded" value="2026" onchange="calculateSchedule()">
            </div>
            <div class="md:col-span-2">
                <label class="block text-xs font-bold mb-1">수업 요일 선택 (선택된 요일만 8회 카운트에 포함)</label>
                <div class="flex gap-4 pt-2">
                    <label><input type="checkbox" class="day-check" value="1" onchange="calculateSchedule()"> 월</label>
                    <label><input type="checkbox" class="day-check" value="2" checked onchange="calculateSchedule()"> 화</label>
                    <label><input type="checkbox" class="day-check" value="3" onchange="calculateSchedule()"> 수</label>
                    <label><input type="checkbox" class="day-check" value="4" checked onchange="calculateSchedule()"> 목</label>
                    <label><input type="checkbox" class="day-check" value="5" onchange="calculateSchedule()"> 금</label>
                </div>
            </div>
            <div class="flex items-end">
                <button onclick="window.print()" class="w-full bg-emerald-600 text-white font-bold py-2 rounded shadow hover:bg-emerald-700">🖨️ A4 용지 인쇄</button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <textarea id="legalHolidays" class="h-24 border p-2 text-xs font-mono" placeholder="법정공휴일 (05-05:어린이날)" oninput="calculateSchedule()"></textarea>
            <textarea id="academyHolidays" class="h-24 border p-2 text-xs font-mono" placeholder="학원휴일 (07-27:방학)" oninput="calculateSchedule()"></textarea>
            <textarea id="prepDays" class="h-24 border p-2 text-xs font-mono" placeholder="Prep Day (05-01:Prep)" oninput="calculateSchedule()"></textarea>
        </div>
        <p class="text-[11px] text-blue-500 mt-2">* 3월 1일부터 시작하여 공휴일을 제외한 수업 요일을 8회씩 묶어 자동으로 세션을 나눕니다.</p>
    </div>

    <div id="printArea" class="max-w-7xl mx-auto">
        <h1 id="mainTitle" class="text-4xl font-black text-center mb-4">2026 CLASS SCHEDULE</h1>

        <div class="flex justify-between items-end mb-4 border-b-2 border-black pb-2">
            <div>
                <div id="displayDays" class="text-2xl font-bold">수업 요일 : 화.목 ( Tue/Thu )</div>
                <div class="text-sm font-bold text-green-700">** 8회 수업 기준으로 세션을 나누어 색상을 구분하였습니다.</div>
            </div>
            <div class="text-right text-xs font-bold space-y-1">
                <div><span class="inline-block w-6 h-3 bg-legal border"></span> 법정 공휴일</div>
                <div><span class="inline-block w-6 h-3 bg-academy border"></span> 학원 지정 휴일</div>
                <div><span class="inline-block w-6 h-3 bg-prep border"></span> Prep Day</div>
            </div>
        </div>

        <div id="calendarGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 print-grid">
            </div>

        <div class="mt-8 pt-4 border-t-2 border-black text-sm font-bold">
            <p>※ 수강료 납부 기간은 매월 25일 부터 말일까지 입니다.</p>
            <div class="flex justify-between">
                <p>※ 휴강 일정과 특강 일정은 학원 사정에 따라 변경 될 수도 있음을 알려 드립니다.</p>
                <p class="text-red-600 text-lg">수강료 회차를 확인 부탁 드립니다.</p>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 (예시)
        const initData = {
            legal: ["03-02:삼일절 대체휴일", "05-05:어린이날", "05-25:부처님오신날 대체", "06-06:현충일", "08-15:광복절", "09-24:추석", "09-25:추석", "09-26:추석", "10-03:개천절", "10-09:한글날", "12-25:성탄절", "01-01:신정", "02-15:설날", "02-16:설날", "02-17:설날"],
            academy: ["07-27:여름방학", "07-28:여름방학", "07-29:여름방학", "07-30:여름방학", "07-31:여름방학"],
            prep: ["07-17:Prep Day", "10-09:Prep Day"]
        };

        window.onload = () => {
            document.getElementById('legalHolidays').value = initData.legal.join('\n');
            document.getElementById('academyHolidays').value = initData.academy.join('\n');
            document.getElementById('prepDays').value = initData.prep.join('\n');
            calculateSchedule();
        };

        function parseInput(id, year) {
            const lines = document.getElementById(id).value.split('\n');
            const map = {};
            const list = {};
            lines.forEach(l => {
                if(!l.includes(':')) return;
                const [date, name] = l.split(':');
                const [mm, dd] = date.split('-').map(Number);
                const targetY = (mm < 3) ? year + 1 : year;
                const dKey = `${targetY}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
                map[dKey] = name;
                if(!list[mm]) list[mm] = [];
                list[mm].push(`${mm}/${dd}: ${name}`);
            });
            return { map, list };
        }

        function calculateSchedule() {
            const year = parseInt(document.getElementById('baseYear').value);
            document.getElementById('mainTitle').innerText = `${year} CLASS SCHEDULE`;
            
            const selectedDays = Array.from(document.querySelectorAll('.day-check:checked')).map(c => parseInt(c.value));
            const weekNames = {1:'월', 2:'화', 3:'수', 4:'목', 5:'금'};
            document.getElementById('displayDays').innerText = `수업 요일 : ${selectedDays.map(d=>weekNames[d]).join('.')} 반`;

            const legal = parseInput('legalHolidays', year);
            const academy = parseInput('academyHolidays', year);
            const prep = parseInput('prepDays', year);

            // 전체 수업 가능일 추출 및 8회 세션 할당
            let allClassDays = [];
            let startDate = new Date(year, 2, 1);
            let endDate = new Date(year + 1, 2, 0);

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const dKey = d.toISOString().split('T')[0];
                if (legal.map[dKey] || academy.map[dKey] || prep.map[dKey]) continue;
                if (selectedDays.includes(d.getDay())) {
                    allClassDays.push(dKey);
                }
            }

            const dayToSession = {};
            allClassDays.forEach((date, index) => {
                const sessionId = Math.floor(index / 8) + 1;
                dayToSession[date] = sessionId;
            });

            render(year, dayToSession, legal, academy, prep);
        }

        function render(year, dayToSession, legal, academy, prep) {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 12; i++) {
                const month = (i + 2) % 12 + 1;
                const currYear = (month < 3) ? year + 1 : year;
                const firstDay = new Date(currYear, month - 1, 1).getDay();
                const lastDate = new Date(currYear, month, 0).getDate();

                // 해당 월의 수업 정보 (배너용)
                const monthClasses = Object.keys(dayToSession).filter(d => d.startsWith(`${currYear}-${String(month).padStart(2,'0')}`));
                let bannerText = "수업 없음";
                let bannerClass = "bg-gray-200";

                if (monthClasses.length > 0) {
                    const startDay = monthClasses[0].split('-')[2];
                    const endDay = monthClasses[monthClasses.length - 1].split('-')[2];
                    bannerText = `${month}월 기간: ${month}/${parseInt(startDay)} ~ ${month}/${parseInt(endDay)} (${monthClasses.length}회)`;
                    
                    // 첫 수업일의 세션 번호에 따라 배너 색 결정 (홀수:연두, 짝수:분홍)
                    const sessionNum = dayToSession[monthClasses[0]];
                    bannerClass = (sessionNum % 2 !== 0) ? "session-odd" : "session-even";
                }

                let html = `
                    <div class="print-card bg-white p-2 rounded shadow-sm flex flex-col">
                        <div class="${bannerClass} text-[10px] font-black text-center py-1 rounded mb-1">${bannerText}</div>
                        <div class="text-center font-bold text-xs mb-1">${currYear}년 ${month}월</div>
                        <table class="w-full text-[10px] text-center border-collapse">
                            <thead>
                                <tr class="text-gray-400 font-normal">
                                    <th class="sun">S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th class="sat">S</th>
                                </tr>
                            </thead>
                            <tbody><tr>`;

                for (let j = 0; j < firstDay; j++) html += `<td></td>`;

                for (let d = 1; d <= lastDate; d++) {
                    const dateObj = new Date(currYear, month - 1, d);
                    const dKey = dateObj.toISOString().split('T')[0];
                    const dayOfWeek = dateObj.getDay();
                    
                    if ((firstDay + d - 1) % 7 === 0 && d !== 1) html += `</tr><tr>`;

                    let bgClass = "";
                    if (legal.map[dKey]) bgClass = "bg-legal";
                    else if (academy.map[dKey]) bgClass = "bg-academy";
                    else if (prep.map[dKey]) bgClass = "bg-prep";
                    else if (dayToSession[dKey]) {
                        bgClass = (dayToSession[dKey] % 2 !== 0) ? "session-odd" : "session-even";
                    }

                    let colorClass = "";
                    if (dayOfWeek === 0) colorClass = "sun";
                    else if (dayOfWeek === 6) colorClass = "sat";

                    html += `<td class="p-0.5"><div class="aspect-square flex items-center justify-center rounded-sm font-bold ${bgClass} ${colorClass}">${d}</div></td>`;
                }

                html += `</tr></tbody></table>
                        <div class="mt-auto pt-2 text-[9px] font-bold text-gray-600 border-t border-dotted mt-2">
                            ${(legal.list[month] || []).map(t => `<div>• ${t}</div>`).join('')}
                            ${(academy.list[month] || []).map(t => `<div>• ${t}</div>`).join('')}
                            ${(prep.list[month] || []).map(t => `<div>• ${t}</div>`).join('')}
                        </div>
                    </div>`;
                grid.innerHTML += html;
            }
        }
    </script>
</body>
</html>
